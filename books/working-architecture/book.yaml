title: "Working Architecture"
subtitle: "A Manual for Building Containers That Hold People"
author: "PlayfulProcess"
description: "The nervous system is not a private possession. It requires another nervous system to regulate. Before we can talk about stories or grammars, we start with the body. A practical manual for parents, teachers, therapists, and anyone who tells stories to anyone else — how to build the containers that hold a person while they become themselves."
source_url: "https://github.com/PlayfulProcess/book-repo"
