title: "Fire Before Responsibility"
subtitle: "A Builder's Case for Verification Before Treaty"
author: "PlayfulProcess"
description: |
  An essay on what the OpenAI Foundation should do with $180 billion, written
  alongside the larger Fire Before Responsibility book project. The argument:
  treating AI like social media is the smokescreen that buys the labs another
  twenty years; the labs themselves cannot stop racing without an enforceable
  agreement; the enforceable agreement requires a verification body modeled
  on the OPCW that does not yet exist; the Foundation is structurally the
  only actor on Earth that can fund it.

  Eight short chapters. The Foreword is the standalone essay; the chapters
  unpack the argument with sources, allocations, and a builder's receipt.
  Closes in the hospicing register Vanessa Andreotti and Bayo Akomolafe
  have given us vocabulary for.
source_url: "https://github.com/PlayfulProcess/freedom-paradox"
