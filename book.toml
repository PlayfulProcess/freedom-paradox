[book]
title = "Fire Before Responsibility"
authors = ["PlayfulProcess"]
description = "Sixty-nine percent of problems never resolve. The question is whether you have a grammar for living inside them. A book about fire, stories, and the responsibility structures this species must build — consciously, in time."
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
additional-css = ["mdbook-theme/substack.css", "mdbook-theme/annotator.css"]
additional-js = ["mdbook-theme/annotator.js"]
no-section-label = true
git-repository-url = ""

