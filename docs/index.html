<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayfulProcess — Books</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #111;
    color: #d4cfc6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .page {
    max-width: 520px;
    width: 100%;
  }

  .header {
    text-align: center;
    margin-bottom: 4rem;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #9a9488;
  }

  .books {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .book-card {
    display: block;
    text-decoration: none;
    padding: 2rem;
    border: 1px solid #2a2824;
    border-radius: 4px;
    transition: border-color 0.3s, background 0.3s;
  }

  .book-card:hover {
    border-color: #4a4640;
    background: #1a1916;
  }

  .book-card .label {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #7a7264;
    margin-bottom: 0.75rem;
  }

  .book-card h2 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: #d4cfc6;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .book-card .subtitle {
    font-size: 0.8rem;
    color: #9a9488;
    font-style: italic;
    margin-bottom: 0.75rem;
  }

  .book-card .meta {
    font-size: 0.65rem;
    color: #5a5650;
    letter-spacing: 0.05em;
  }

  .book-card.grammars h2 { color: #c4a46c; }
  .book-card.freedom h2 { color: #a0b4d4; }

  .footer {
    text-align: center;
    margin-top: 4rem;
    font-size: 0.6rem;
    color: #3a3834;
    letter-spacing: 0.1em;
  }

  .footer a {
    color: #5a5650;
    text-decoration: none;
  }

  @media (max-width: 600px) {
    .book-card { padding: 1.5rem; }
    .book-card h2 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1>PlayfulProcess</h1>
  </div>

  <div class="books">
    <a href="freedom-paradox.html" class="book-card freedom">
      <div class="label">Book One &middot; Complete Draft</div>
      <h2>The Freedom Paradox</h2>
      <div class="subtitle">Open Source, AI, and the Limits of Openness</div>
      <div class="meta">16 chapters + epilogue &middot; ~64,000 words</div>
    </a>

    <a href="grammars.html" class="book-card grammars">
      <div class="label">Book Two &middot; First Draft</div>
      <h2>Grammars of the Living World</h2>
      <div class="subtitle">CC BY-SA 4.0</div>
      <div class="meta">9 chapters &middot; ~16,100 words</div>
    </a>
  </div>

  <div class="footer">
    <a href="https://recursive.eco">recursive.eco</a>
  </div>
</div>

</body>
</html>
