name: Deploy book to GitHub Pages

on:
  push:
    branches: [main, master, claude-organize-research, claude/plan-shareable-links-gFIq0]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x mdbook
          sudo mv mdbook /usr/local/bin/

      - name: Sync chapter files to src/
        run: |
          # The Species That Got Fire (consolidated book)
          mkdir -p src/consolidated
          cp books/consolidated/chapters/*.md src/consolidated/

          # The Real Cost of Lunch (standalone companion)
          mkdir -p src/real-cost-of-lunch
          cp books/real-cost-of-lunch/chapters/ch*.md src/real-cost-of-lunch/

          # Charts
          mkdir -p src/images
          cp models/charts/*.png src/images/ 2>/dev/null || true

      - name: Build mdbook
        run: |
          mdbook build
          cp CNAME book/ 2>/dev/null || true

      - name: Add EPUBs and library landing page
        run: |
          # Copy EPUBs into the build output
          mkdir -p book/epubs
          cp docs/epubs/*.epub book/epubs/ 2>/dev/null || true

          # Use the library landing page as the site index
          cp docs/epubs/index.html book/index.html 2>/dev/null || true

          # Fix epub links to point to epubs/ subdirectory
          sed -i 's|href="\([^"]*\.epub\)"|href="epubs/\1"|g' book/index.html 2>/dev/null || true

          # Keep mdbook content accessible at /reader/
          mkdir -p book/reader
          # Move mdbook's index to reader/ so both coexist
          if [ -f book/index.html.bak ]; then rm book/index.html.bak; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
