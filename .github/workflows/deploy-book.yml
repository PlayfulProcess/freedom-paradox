name: Deploy book to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - claude-organize-research
      - claude/plan-shareable-links-gFIq0
      - claude/restructure-book-skeleton-iOLJh  # current default branch — deploy on every push here
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x mdbook
          sudo mv mdbook /usr/local/bin/

      - name: Sync chapter files to src/
        run: |
          # The Species That Got Fire (consolidated book)
          mkdir -p src/consolidated
          cp books/consolidated/chapters/*.md src/consolidated/

          # The Real Cost of Lunch (standalone companion)
          mkdir -p src/real-cost-of-lunch
          cp books/real-cost-of-lunch/chapters/ch*.md src/real-cost-of-lunch/

          # The Axiom Beneath the Ground v2
          mkdir -p src/axiom-v2
          cp books/axiom-beneath-the-ground/chapters/v2-ch*.md src/axiom-v2/
          cp books/axiom-beneath-the-ground/chapters/the-ceremony.md src/axiom-v2/

          # The Axiom Beneath the Ground v3 — Kundera-style (7 chapters + Ceremony)
          mkdir -p src/axiom-v3
          cp books/axiom-beneath-the-ground/chapters/v3/*.md src/axiom-v3/
          cp books/axiom-beneath-the-ground/chapters/the-ceremony.md src/axiom-v3/

          # The Axiom Beneath the Ground v5 — latest (14 chapters including interludes)
          mkdir -p src/axiom-v5
          cp books/axiom-beneath-the-ground/chapters/v5/ch*.md src/axiom-v5/

          # Standalone books
          mkdir -p src/freedom-paradox src/working-architecture src/fire-and-intelligence
          cp books/freedom-paradox/chapters/ch*.md src/freedom-paradox/
          cp books/working-architecture/chapters/ch*.md src/working-architecture/
          cp books/fire-and-intelligence/chapters/ch*.md src/fire-and-intelligence/

          # Charts
          mkdir -p src/images
          cp models/charts/*.png src/images/ 2>/dev/null || true

      - name: Build mdbook
        run: |
          mdbook build
          cp CNAME book/ 2>/dev/null || true

      - name: Add library landing page
        run: |
          # Save mdbook's index so it remains accessible
          cp book/index.html book/reader-index.html 2>/dev/null || true

          # Library landing page becomes the site index
          # EPUB links now point to GitHub Releases (absolute URLs), no sed needed
          cp docs/epubs/index.html book/index.html 2>/dev/null || true

          # Fix "Read Online" links: remove ../ prefix (they were relative to epubs/)
          sed -i 's|href="\.\./|href="|g' book/index.html 2>/dev/null || true

          # Fix "Web Reader" footer link
          sed -i 's|href="\.\./index\.html"|href="reader-index.html"|g' book/index.html 2>/dev/null || true

          # Copy directly-hosted EPUBs + PDFs (for books not on GitHub Releases, like axiom-v5)
          # Index.html uses relative paths like href="axiom-v5.epub", so files need to sit at book/ root.
          cp docs/epubs/*.epub book/ 2>/dev/null || true
          cp docs/epubs/*.pdf book/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
