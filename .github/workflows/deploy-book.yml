name: Deploy book to GitHub Pages

on:
  push:
    branches: [main, master, claude-organize-research, claude/plan-shareable-links-gFIq0]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook and mdbook-epub
        run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x mdbook
          sudo mv mdbook /usr/local/bin/
          cargo install mdbook-epub --version 0.4.39 2>/dev/null || echo "mdbook-epub install failed, EPUB will be skipped"

      - name: Sync chapter files to src/
        run: |
          # The Species That Got Fire (consolidated book)
          mkdir -p src/consolidated
          cp books/consolidated/chapters/*.md src/consolidated/

          # The Real Cost of Lunch (standalone companion)
          mkdir -p src/real-cost-of-lunch
          cp books/real-cost-of-lunch/chapters/ch*.md src/real-cost-of-lunch/

          # Charts
          mkdir -p src/images
          cp models/charts/*.png src/images/ 2>/dev/null || true

      - name: Enable epub backend for CI
        run: |
          # Uncomment epub backend in book.toml for CI builds
          sed -i 's/^# \[output\.epub\]/[output.epub]/' book.toml
          sed -i 's/^# additional-css/additional-css/' book.toml

      - name: Build mdbook (HTML + EPUB)
        run: |
          mdbook build
          cp CNAME book/ 2>/dev/null || true
          # Copy EPUB to book/ for download
          if [ -f book/epub/The\ Species\ That\ Got\ Fire.epub ]; then
            cp "book/epub/The Species That Got Fire.epub" book/the-species-that-got-fire.epub
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - name: Upload EPUB artifact
        if: hashFiles('book/the-species-that-got-fire.epub') != ''
        uses: actions/upload-artifact@v4
        with:
          name: epub
          path: book/the-species-that-got-fire.epub

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
